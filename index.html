<!DOCTYPE html>
<html>
<head>
  <title>Street Light Dashboard (3 Poles)</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

  <style>
    #map { height: 100vh; width: 100%; }
  </style>
</head>

<body>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    // 🔥 Firebase Config
    var firebaseConfig = {
      apiKey: "AIzaSyDCHgKJeB--KlUKseqeAZctPb_pnkImPqg",
      databaseURL: "https://faulty-street-light-finder-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    // 🌍 Map initialize
    var map = L.map('map').setView([19.07, 72.87], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Store markers for 3 poles
    var markers = {
      pole1: null,
      pole2: null,
      pole3: null
    };

    // 🎨 Status color
    function getColor(status) {
      if(status === "WORKING") return "green";
      if(status === "FAULT") return "red";
      return "gray";
    }

    // 🔄 Live update
    db.ref().on("value", function(snapshot) {
      var data = snapshot.val();

      updatePole("pole1", data);
      updatePole("pole2", data);
      updatePole("pole3", data);
    });

    // 🔧 Function for each pole
    function updatePole(poleName, data) {
      if(!data[poleName]) return;

      let pole = data[poleName];
      let lat = pole.lat;
      let lon = pole.lon;
      let status = pole.status;
      let color = getColor(status);

      if(markers[poleName]) {
        markers[poleName].setLatLng([lat, lon]);
        markers[poleName].setStyle({
          color: color,
          fillColor: color
        });
      } 
      else {
        markers[poleName] = L.circleMarker([lat, lon], {
          radius: 10,
          color: color,
          fillColor: color,
          fillOpacity: 1
        }).addTo(map)
          .bindPopup(poleName.toUpperCase() + ": " + status);
      }
    }
  </script>
</body>
</html>
