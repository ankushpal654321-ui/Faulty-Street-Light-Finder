<!DOCTYPE html>
<html>
<head>
  <title>Smart Street Light Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { margin:0; font-family: Arial; }
    #map { height: 90vh; }

    /* Info Box */
    #info {
      text-align:center;
      padding:10px;
      background:#111;
      color:white;
    }

    /* Pole shapes (SVG markers) */
    .pole-icon {
      width: 30px;
      height: 50px;
      display: block;
    }
  </style>
</head>
<body>
  <div id="info">Smart Street Light Map - Gray=OFF, Green=Working, Red=Fault</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // --- Map Initialization ---
    var map = L.map('map').setView([19.0760, 72.8777], 16);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: 'Map data © OpenStreetMap contributors'
    }).addTo(map);

    // --- Pole Data ---
    var poles = [
      {name:"Pole 1", lat:19.0760, lng:72.8777, status:0},
      {name:"Pole 2", lat:19.0765, lng:72.8780, status:0},
      {name:"Pole 3", lat:19.0770, lng:72.8785, status:0}
    ];

    // --- Color logic (updated for Red=3) ---
    function getPoleColor(status){
      if(status===0) return "gray";    // Gray
      if(status===1) return "green";   // Green
      if(status===3) return "red";     // Red
      return "gray";
    }

    // --- Create custom SVG pole marker ---
    function createPoleIcon(color){
      var svg = `<svg class="pole-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 50">
        <rect x="8" y="5" width="4" height="40" fill="${color}" stroke="black" stroke-width="1"/>
        <circle cx="10" cy="5" r="5" fill="${color}" stroke="black" stroke-width="1"/>
      </svg>`;
      return L.divIcon({className:'', html: svg, iconSize:[30,50], iconAnchor:[15,50]});
    }

    // --- Add markers ---
    var markers = [];
    poles.forEach((pole, idx)=>{
      var marker = L.marker([pole.lat, pole.lng], {icon: createPoleIcon(pole.status)})
                    .bindPopup(`<b>${pole.name}</b><br>Status: ${pole.status===0?'Gray (OFF)':pole.status===1?'Green (Working)':'Red (Fault)'}</b>`)
                    .addTo(map);
      markers.push(marker);
    });

    // --- Update from ThingSpeak ---
    async function updatePoleStatus(){
      try{
        // Replace this URL with your ThingSpeak channel feed JSON
        var url = "https://api.thingspeak.com/channels/3311507/feeds.json?results=1";
        let response = await fetch(url);
        let data = await response.json();

        let feeds = data.feeds[0];
        let statusArr = [parseInt(feeds.field1), parseInt(feeds.field2), parseInt(feeds.field3)];

        statusArr.forEach((s, idx)=>{
          poles[idx].status = s;
          markers[idx].setIcon(createPoleIcon(getPoleColor(s)));
          markers[idx].setPopupContent(`<b>${poles[idx].name}</b><br>Status: ${s===0?'Gray (OFF)':s===1?'Green (Working)':s===3?'Red (Fault)':'Unknown'}</b>`);
        });
      } catch(err){
        console.error("Error fetching ThingSpeak data", err);
      }
    }

    // --- Auto refresh every 20 seconds ---
    updatePoleStatus();
    setInterval(updatePoleStatus, 20000);

  </script>
</body>
</html>
