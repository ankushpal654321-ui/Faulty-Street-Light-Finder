<!DOCTYPE html>
<html>
<head>
  <title>Smart Poles Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { margin:0; font-family:Arial; }
    #map { height:100vh; }
    #info {
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      background:white;
      padding:10px 20px;
      border-radius:5px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      z-index:1000;
    }
    canvas { width:250px !important; height:150px !important; }
  </style>
</head>
<body>
<div id="info">Smart Pole Status Map</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  // --- Initialize map ---
  var map = L.map('map').setView([19.07, 72.87], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '© OpenStreetMap'
  }).addTo(map);

  // --- Pole icon ---
  function createPoleIcon(color) {
      return L.divIcon({
          html: `<div style="
              width:20px; height:40px; background:${color};
              border-radius:4px; position:relative;">
              <div style="
                width:0; height:0;
                border-left:10px solid transparent;
                border-right:10px solid transparent;
                border-bottom:10px solid ${color};
                position:absolute; top:-10px; left:0;"></div>
          </div>`,
          className:'', iconSize:[20,50], iconAnchor:[10,50], popupAnchor:[0,-50]
      });
  }

  // --- Poles initialization ---
  var poles = [
      { name:'Pole 1', lat:19.072, lon:72.882, status:'gray', field:'field1' },
      { name:'Pole 2', lat:19.068, lon:72.885, status:'gray', field:'field2' },
      { name:'Pole 3', lat:19.070, lon:72.890, status:'gray', field:'field3' }
  ];
  var poleMarkers = [];
  const apiKey = "50TS40IY7R5RVBKP"; // ThingSpeak API key

  // --- Add poles to map ---
  poles.forEach((pole, index)=>{
      var marker = L.marker([pole.lat, pole.lon], {icon:createPoleIcon('gray')})
          .bindPopup(`<b>${pole.name}</b><br>Status: gray<br>Click for history`)
          .addTo(map);
      marker.on('popupopen', ()=>{ fetchHistoricalData(pole.field, marker); });
      poleMarkers.push(marker);
  });

  // --- Fetch live status ---
  async function fetchPoleStatus(){
      try{
          const res = await fetch(`https://api.thingspeak.com/channels/ 3311507/feeds.json?api_key=${apiKey}&results=1`);
          const data = await res.json();
          const feed = data.feeds[0];

          poles.forEach((pole, index)=>{
              let val = feed[pole.field];
              let color = 'gray';

              if(val !== null && val !== undefined && val !== ""){
                  val = parseInt(val);
                  if(val === 1) color = 'green'; // LED working correctly
                  else if(val === 2) color = 'red';   // LED fault / darkness not detected
                  else color = 'gray';
              }

              pole.status = color;
              poleMarkers[index].setIcon(createPoleIcon(color));
              poleMarkers[index].setPopupContent(`<b>${pole.name}</b><br>Status: ${color}<br>Click for history`);
          });
      }catch(err){ console.error("ThingSpeak fetch error:", err); }
  }

  fetchPoleStatus(); 
  setInterval(fetchPoleStatus, 10000); // every 10 sec

  // --- Fetch historical data for popup chart ---
  async function fetchHistoricalData(field, marker){
      try{
          const fieldNum = field.slice(-1);
          const res = await fetch(`https://api.thingspeak.com/channels/ 3311507/fields/${fieldNum}.json?api_key=${apiKey}&results=20`);
          const data = await res.json();
          const feeds = data.feeds;

          const labels = feeds.map(f=>f.created_at.slice(11,19));
          const values = feeds.map(f=>parseInt(f[`field${fieldNum}`]||0));

          const popupContent = `<b>${marker.getPopup().getContent().split('<br>')[0]}</b><br>
                                <canvas id="chart${field}" width="250" height="150"></canvas>`;
          marker.setPopupContent(popupContent);

          setTimeout(()=>{
              const ctx = document.getElementById(`chart${field}`).getContext('2d');
              new Chart(ctx,{
                  type:'line',
                  data:{
                      labels:labels,
                      datasets:[{
                          label:'Status (0=Gray,1=Green,2=Red)',
                          data:values,
                          borderColor:'blue',
                          backgroundColor:'rgba(0,0,255,0.1)',
                          tension:0.2,
                          fill:true
                      }]
                  },
                  options:{
                      responsive:false,
                      plugins:{legend:{display:false}},
                      scales:{y:{min:0,max:2,ticks:{stepSize:1}}}
                  }
              });
          },100);

      }catch(err){ console.error("Historical fetch error:",err); }
  }

</script>
</body>
</html>
