<!DOCTYPE html>
<html>
<head>
  <title>Smart Street Light Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }

    .pole-label {
      font-size: 12px;
      font-weight: bold;
      color: black;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>

// MAP
var map = L.map('map').setView([19.417328,72.819202], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// POLES
var poles = [
  {lat:19.417328, lng:72.819202, name:"Pole 1"},
  {lat:19.418025, lng:72.821911, name:"Pole 2"},
  {lat:19.424211, lng:72.826491, name:"Pole 3"}
];

var markers = [];

poles.forEach((pole) => {

  let marker = L.circleMarker([pole.lat, pole.lng], {
    radius: 10,
    color: "gray"
  }).addTo(map);

  marker.bindTooltip(pole.name, {
    permanent: true,
    direction: "bottom"
  }).openTooltip();

  markers.push(marker);
});

// AUTO ZOOM
var group = new L.featureGroup(markers);
map.fitBounds(group.getBounds());

// FIREBASE FETCH
function updateData(){

  fetch("https://faulty-street-light-finder-default-rtdb.firebaseio.com/poles.json")
  .then(res => res.json())
  .then(data => {

    let status = [
      data.pole1,
      data.pole2,
      data.pole3
    ];

    for(let i=0;i<3;i++){

      if(status[i] === -1){
        markers[i].setStyle({color:"gray"});

      } else if(status[i] === 1){
        markers[i].setStyle({color:"green"});

      } else if(status[i] === 0){
        markers[i].setStyle({color:"red"});
      }
    }
  })
  .catch(err => console.log(err));
}

// FAST UPDATE ⚡
setInterval(updateData, 2000);

</script>

</body>
</html>
