<!DOCTYPE html>
<html>
<head>
  <title>Smart Street Light Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }

    .pole-label {
      font-size: 12px;
      font-weight: bold;
      color: black;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>

// MAP INIT
var map = L.map('map').setView([19.467960,72.888108], 15);

// TILE
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// -------- ONLY ONE POLE --------
var pole = {lat:19.467960, lng:72.888108, name:"Pole 1"};

// CREATE CIRCLE MARKER
var marker = L.circleMarker([pole.lat, pole.lng], {
  radius: 10,
  color: "gray"
}).addTo(map);

// NAME BELOW
marker.bindTooltip(pole.name, {
  permanent: true,
  direction: "bottom",
  offset: [0, 10],
  className: "pole-label"
}).openTooltip();

// -------- FETCH THINGSPEAK --------
function updateData(){

  fetch("https://api.thingspeak.com/channels/3311507/feeds/last.json")
  .then(res => res.json())
  .then(data => {

    let status = Number(data.field1); // ONLY FIELD1

    if(status === -1){
      marker.setStyle({color:"gray"});   // DAY

    } else if(status === 1){
      marker.setStyle({color:"green"});  // WORKING

    } else if(status === 0){
      marker.setStyle({color:"red"});    // FAULT
    }
  })
  .catch(err => console.log(err));
}

// AUTO UPDATE
setInterval(updateData, 5000);

</script>

</body>
</html>
