<!DOCTYPE html>
<html>
<head>
  <title>Street Light Dashboard</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-top: 100px;
    }

    .pole {
      text-align: center;
    }

    .dot {
      height: 80px;
      width: 80px;
      border-radius: 50%;
      display: inline-block;
      margin-bottom: 10px;
    }

    .green { background: green; }
    .red { background: red; }
    .gray { background: gray; }
  </style>
</head>

<body>

<h1>Street Light Monitoring System</h1>

<div class="container">

  <div class="pole">
    <div id="p1" class="dot gray"></div>
    <p>Pole 1</p>
  </div>

  <div class="pole">
    <div id="p2" class="dot gray"></div>
    <p>Pole 2</p>
  </div>

  <div class="pole">
    <div id="p3" class="dot gray"></div>
    <p>Pole 3</p>
  </div>

</div>

<script>

const channelID = "YOUR_CHANNEL_ID";

function updateData(){
  fetch(`https://api.thingspeak.com/channels/${channelID}/feeds/last.json`)
  .then(res => res.json())
  .then(data => {

    setColor("p1", data.field1);
    setColor("p2", data.field2);
    setColor("p3", data.field3);

  });
}

function setColor(id, status){
  let el = document.getElementById(id);
  el.className = "dot";

  if(status === "GREEN") el.classList.add("green");
  else if(status === "RED") el.classList.add("red");
  else el.classList.add("gray");
}

// Auto refresh every 5 sec
setInterval(updateData, 5000);

</script>

</body>
</html>
