<!DOCTYPE html>
<html>
<head>
  <title>Smart Street Light Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script>

// MAP INIT
var map = L.map('map').setView([19.467960,72.888108 ], 15);

// TILE
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// POLE LOCATIONS
var poles = [
  {lat:19.467960, lng:72.888108},
  {lat:19.467040, lng:72.872570},
  {lat:19.469308, lng:72.862342}
];

var markers = [];

// CREATE MARKERS
for(let i=0;i<poles.length;i++){
  let marker = L.circleMarker([poles[i].lat, poles[i].lng], {
    radius: 10,
    color: "gray"
  }).addTo(map);

  markers.push(marker);
}

// FETCH THINGSPEAK
function updateData(){

  fetch("https://api.thingspeak.com/channels/3311507/feeds/last.json")
  .then(res => res.json())
  .then(data => {

    let status = [
      parseInt(data.field1),
      parseInt(data.field2),
      parseInt(data.field3)
    ];

    for(let i=0;i<3;i++){

      if(status[i] == -1){
        markers[i].setStyle({color:"gray"}); // OFF

      } else if(status[i] == 1){
        markers[i].setStyle({color:"green"}); // WORKING

      } else if(status[i] == 0){
        markers[i].setStyle({color:"red"}); // FAULT
      }
    }
  });
}

// UPDATE EVERY 10 SEC
setInterval(updateData, 10000);

</script>

</body>
</html>
