<!DOCTYPE html>
<html>
<head>
  <title>Smart Street Light Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }

    button {
      margin-top: 5px;
      padding: 5px 10px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>

// MAP INIT
var map = L.map('map').setView([19.420500,72.819646], 14);

// TILE
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// POLES DATA
var poles = [
  {lat:19.420500, lng:72.819646, name:"Pole 1"},
  {lat:19.414958, lng:72.824464, name:"Pole 2"},
  {lat:19.410861, lng:72.827734, name:"Pole 3"}
];

var markers = [];

// STORE HISTORY
var historyData = [[], [], []];

// CREATE MARKERS
poles.forEach((pole, i) => {

  let marker = L.circleMarker([pole.lat, pole.lng], {
    radius: 12,
    color: "gray",
    weight: 3
  }).addTo(map);

  marker.bindTooltip(pole.name, {
    permanent: true,
    direction: "bottom"
  }).openTooltip();

  // CLICK EVENT
  marker.on("click", function(){

    fetch("https://faulty-street-light-finder-default-rtdb.firebaseio.com/poles.json")
    .then(res => res.json())
    .then(data => {

      let status = data["pole"+(i+1)];

      let statusText = "";
      if(status === 1) statusText = "🟢 Working";
      else if(status === 0) statusText = "🔴 Fault";
      else statusText = "⚪ Day";

      // FAULT HISTORY
      let faultCount = historyData[i].length;
      let lastFault = faultCount > 0 ? historyData[i][faultCount-1] : "No faults";

      // SIMPLE AI PREDICTION
      let prediction = (faultCount >= 3) ? "⚠️ High Risk" : "✅ Normal";

      // GOOGLE MAP LINK
      let mapLink = "https://www.google.com/maps?q=" + pole.lat + "," + pole.lng;

      let content = `
        <b>${pole.name}</b><br>
        Status: ${statusText}<br><br>

        Fault Count Today: ${faultCount}<br>
        Last Fault: ${lastFault}<br>
        Prediction: ${prediction}<br><br>

        <button onclick="window.open('${mapLink}')">
        📍 Navigate
        </button>
      `;

      marker.bindPopup(content).openPopup();

    })
    .catch(err => console.log(err));

  });

  markers.push(marker);
});

// AUTO ZOOM
var group = new L.featureGroup(markers);
map.fitBounds(group.getBounds());

// FETCH DATA + UPDATE
function updateData(){

  fetch("https://faulty-street-light-finder-default-rtdb.firebaseio.com/poles.json")
  .then(res => res.json())
  .then(data => {

    if(!data) return; // safety

    let status = [
      data.pole1,
      data.pole2,
      data.pole3
    ];

    for(let i=0;i<3;i++){

      // STORE FAULT HISTORY
      if(status[i] === 0){
        let time = new Date().toLocaleTimeString();
        historyData[i].push(time);

        // LIMIT HISTORY
        if(historyData[i].length > 10){
          historyData[i].shift();
        }
      }

      // COLOR UPDATE
      if(status[i] === -1){
        markers[i].setStyle({color:"gray"});

      } else if(status[i] === 1){
        markers[i].setStyle({color:"green"});

      } else if(status[i] === 0){
        markers[i].setStyle({color:"red"});
      }
    }

  })
  .catch(err => console.log(err));
}

// AUTO UPDATE
setInterval(updateData, 2000);

</script>

</body>
</html>
