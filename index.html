<!DOCTYPE html>
<html>
<head>
  <title>Smart Street Light Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }

    .pole-label {
      font-size: 12px;
      font-weight: bold;
      color: black;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>

// MAP INIT
var map = L.map('map').setView([19.467960,72.888108], 14);

// TILE
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// -------- 3 POLES DATA --------
var poles = [
  {lat:19.467960, lng:72.888108, name:"Pole 1"},
  {lat:19.467040, lng:72.872570, name:"Pole 2"},
  {lat:19.469308, lng:72.862342, name:"Pole 3"}
];

// STORE MARKERS
var markers = [];

// CREATE MARKERS
poles.forEach((pole, index) => {

  let marker = L.circleMarker([pole.lat, pole.lng], {
    radius: 10,
    color: "gray"
  }).addTo(map);

  marker.bindTooltip(pole.name, {
    permanent: true,
    direction: "bottom",
    offset: [0, 10],
    className: "pole-label"
  }).openTooltip();

  markers.push(marker);
});

// -------- FETCH THINGSPEAK --------
function updateData(){

  fetch("https://api.thingspeak.com/channels/3311507/feeds/last.json")
  .then(res => res.json())
  .then(data => {

    let status = [
      Number(data.field1),
      Number(data.field2),
      Number(data.field3)
    ];

    for(let i=0;i<3;i++){

      if(status[i] === -1){
        markers[i].setStyle({color:"gray"});   // DAY

      } else if(status[i] === 1){
        markers[i].setStyle({color:"green"});  // WORKING

      } else if(status[i] === 0){
        markers[i].setStyle({color:"red"});    // FAULT
      }
    }
  })
  .catch(err => console.log(err));
}

// AUTO UPDATE
setInterval(updateData, 15000);

</script>

</body>
</html>
